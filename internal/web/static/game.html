<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link rel="icon" href="kula.svg">
    <meta name="description" content="Retro Space Invaders arcade game - an easter egg in the Kulaerver monitor.">
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <!-- Scanline CRT overlay -->
    <div class="scanlines"></div>

    <!-- Back to dashboard -->
    <a href="/" class="back-link" id="back-link">← <span class="back-text">Dashboard</span></a>

    <!-- HUD -->
    <div class="hud" id="hud">
        <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">LEVEL</span>
            <span class="hud-value" id="hud-level">1</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">HIGH</span>
            <span class="hud-value" id="hud-high">0</span>
        </div>
        <div class="hud-item hud-lives">
            <span class="hud-label">LIVES</span>
            <span class="hud-value" id="hud-lives">♥♥♥</span>
        </div>
        <div class="hud-item hud-controls" id="hud-controls">
            <button class="mute-btn" id="btn-mute" aria-label="Toggle Mute">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="fs-icon"
                    id="mute-icon">
                    <path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
            </button>
            <button class="fullscreen-btn" id="btn-fullscreen" aria-label="Toggle Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="fs-icon">
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Game canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Start screen overlay -->
    <div class="overlay" id="start-screen">
        <div class="overlay-content">
            <h1 class="game-title">SPACE<br><span class="title-accent">INVADERS</span></h1>
            <div class="title-subtitle">KULA-SZPIEGULA ARCADE</div>
            <div class="controls-info">
                <div class="control-row"><kbd>←</kbd> <kbd>→</kbd> Move</div>
                <div class="control-row"><kbd>Space</kbd> Shoot</div>
                <div class="control-row"><kbd>Esc</kbd> Pause</div>
            </div>
            <div class="start-prompt blink" id="start-prompt">PRESS ENTER OR TAP TO START</div>
        </div>
    </div>

    <!-- Pause overlay -->
    <div class="overlay hidden" id="pause-screen">
        <div class="overlay-content">
            <h2 class="pause-title">PAUSED</h2>
            <div class="start-prompt blink" id="pause-prompt">PRESS ESC OR TAP TO RESUME</div>
        </div>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="gameover-screen">
        <div class="overlay-content">
            <h2 class="gameover-title">GAME OVER</h2>
            <div id="new-highscore-alert" class="hidden highscore-alert blink">NEW HIGH SCORE!</div>
            <div class="final-score">
                <span class="final-label">FINAL SCORE</span>
                <span class="final-value" id="final-score">0</span>
            </div>
            <div class="final-score">
                <span class="final-label">HIGH SCORE</span>
                <span class="final-value" id="final-high">0</span>
            </div>
            <div class="start-prompt blink" id="restart-prompt">PRESS ENTER OR TAP TO RESTART</div>
        </div>
    </div>

    <!-- Level up overlay -->
    <div class="overlay hidden" id="levelup-screen">
        <div class="overlay-content">
            <h2 class="levelup-title">LEVEL <span id="levelup-num">2</span></h2>
            <div class="levelup-text">GET READY</div>
        </div>
    </div>

    <!-- Mobile controls -->
    <div class="mobile-controls" id="mobile-controls">
        <div class="control-group movement">
            <button class="mobile-btn" id="btn-left" aria-label="Move Left">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M5 12L12 19M5 12L12 5" />
                </svg>
            </button>
            <button class="mobile-btn" id="btn-right" aria-label="Move Right">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" />
                </svg>
            </button>
        </div>
        <div class="control-group action">
            <button class="mobile-btn fire-btn" id="btn-fire" aria-label="Shoot">
                <div class="fire-inner"></div>
            </button>
        </div>
        <div class="control-group utility">
            <button class="mobile-btn pause-btn" id="btn-pause" aria-label="Pause">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
            </button>
        </div>
    </div>

    <script src="game.js" integrity="sha384-YOLyNbCk0hd8N3CDDVV66gmCgFqckflIw6jgz48gDh3KyNHVV61WRaV7JmOzd0pd"
        crossorigin="anonymous"></script>
</body>

</html>
