version: '3.8'

services:
  kula:
    image: kula:latest
    container_name: kula
    pid: "host"       # Critical for monitoring host processes
    network_mode: "host" # Useful for network monitoring, depending on kula's needs. Alternatively, map ports.
    volumes:
      # To monitor the host system, we need access to host's /proc
      - /proc:/proc:ro
      
      # Mount the configuration file from the host
      - ./config.yaml:/etc/kula/config.yaml:ro
      
      # Persist data
      - kula_data:/var/lib/kula

    # Use 'serve' command
    command: ["serve", "--config", "/etc/kula/config.yaml"]
    
    restart: unless-stopped

volumes:
  kula_data:
